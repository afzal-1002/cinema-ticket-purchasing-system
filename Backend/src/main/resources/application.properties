# Application Name
spring.application.name=cinema-ticket-system

# Use Ant-style path matching so SPA catch-all routes remain compatible
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Server Port
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cinema_ticket?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configurationcret=nT9Z0x1eFZxW4vB3qL6J7a9sC2mKQ5D8YpH0R+EwA6Uj8MZLrNfT1cS4oI=
jwt.secret=nT9Z0x1eFZxW4vB3qL6J7a9sC2mKQ5D8YpH0R+EwA6Uj8MZLrNfT1cS4oI=
jwt.expiration=900000

# CORS Configuration
cors.allowed-origins=http://localhost:4200

# Email Configuration (Gmail example - configure for your SMTP server)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Application Configuration
app.name=Cinema Ticket System

# Logging
logging.level.com.cinema=DEBUG
logging.level.org.springframework.security=DEBUG
