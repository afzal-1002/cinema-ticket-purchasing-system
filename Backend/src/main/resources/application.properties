# Application Name
spring.application.name=cinema-ticket-system

# Use Ant-style path matching so SPA catch-all routes remain compatible
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Server Port
server.port=8080

# H2 Database Configuration (Development)
spring.datasource.url=jdbc:h2:mem:cinemadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

