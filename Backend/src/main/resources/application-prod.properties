# Production Configuration

# MySQL Configuration
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/cinema-ticket?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# SQL Server Configuration (alternative - uncomment if using SQL Server)
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=cinemadb;encrypt=true;trustServerCertificate=true
# spring.datasource.username=sa
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 Console in Production
spring.h2.console.enabled=false

# Logging
logging.level.com.cinema=INFO
logging.level.org.springframework.security=WARN
